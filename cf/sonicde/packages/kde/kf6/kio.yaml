sources:
    git:
        url: ${kf6_git}/${@basename}.git
        ref: ${ref}
        depth: 1
        fetch:
            - refs/tags/${ref}:refs/tags/${ref}
        force-checkout: ${kf6_force}

ref: ${kf6_version}

buildsystem: cmake

build-depends:
    - sonicde/sonic-frameworks-cmake-modules

depends:
    - qt6/qtbase
    - sonicde/sonic-frameworks-app-info
    - sonicde/sonic-frameworks-autocomplete
    - sonicde/sonic-frameworks-bookmarks
    - sonicde/sonic-frameworks-color-scheme
    - sonicde/sonic-frameworks-crash-handler
    - sonicde/sonic-frameworks-data-views
    - sonicde/sonic-frameworks-dbus
    - sonicde/sonic-frameworks-device-integration
    - sonicde/sonic-frameworks-icon-themes
    - sonicde/sonic-frameworks-progress-ui
    - sonicde/sonic-frameworks-windowsystem

cmake-extra-args:
    - -DWITH_WAYLAND=OFF
