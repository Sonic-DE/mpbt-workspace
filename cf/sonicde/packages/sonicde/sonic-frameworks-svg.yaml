sources:
    git:
        url: ${kf6_git}/${@basename}.git
        ref: ${ref}
        depth: 1
        fetch:
            - refs/tags/${ref}:refs/tags/${ref}
        force-checkout: ${kf6_force}

ref: ${kf6_version}

buildsystem: cmake

build-depends:
    - sonicde/sonic-frameworks-cmake-modules

depends:
    - kde/kf6/karchive
    - kde/kf6/kconfig
    - kde/kf6/kcolorscheme
    - sonicde/sonic-frameworks-core-addons
    - sonicde/sonic-frameworks-quick-ui
