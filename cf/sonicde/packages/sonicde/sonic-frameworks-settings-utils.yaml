sources:
    git:
        url: ${kf6_git}/${@basename}.git
        ref: ${ref}
        depth: 1
        fetch:
            - refs/tags/${ref}:refs/tags/${ref}
        force-checkout: ${kf6_force}

ref: ${kf6_version}

buildsystem: cmake

build-depends:
    - sonicde/sonic-frameworks-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kconfigwidgets
    - sonicde/sonic-frameworks-io
    - kde/kf6/kxmlgui
    - sonicde/sonic-frameworks-quick-ui
