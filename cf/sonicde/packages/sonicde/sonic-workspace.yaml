sources:
    git:
        ref: origin/${master_branch}
        remotes:
            origin:
                url: ${sonicde_git}/${@basename}.git
                depth: ${sonic_depth}
                fetch: ${@SOLUTION::fetch::origin}
            upstream:
                url: ${plasma_git}/plasma-workspace.git
                depth: ${upstream_depth}
                fetch: ${@SOLUTION::fetch::upstream}
        config:
            autopick.enabled: 'true'
            autopick.upstream: upstream/Plasma/6.7
            autopick.master: origin/${master_branch}
            autopick.tracker: origin/tracking/plasma-6.7
            advice.detachedHead: 'false'
            remote.origin.tagOpt: --no-tags
            remote.upstream.tagOpt: --no-tags
        local-branch: ${master_branch}

master_branch: master

buildsystem: cmake

depends:
    - qt6/qtlocation
    - kde/libraries/polkit-qt-1
    - kde/kf6/kdeclarative
    - kde/kf6/prison
    - kde/qcoro6
    - kde/kf6/kded
    - kde/kf6/kparts
    - kde/kf6/ktexteditor
    - kde/kf6/ktextwidgets
    - kde/kf6/kwallet
    - kde/plasma/plasma-activities-stats
    - sonicde/sonic-frameworks-runner
    - sonicde/sonic-interface-libraries
    - sonicde/sonic-screen
    - sonicde/sonic-screenlocker
    - sonicde/sonic-win

build-depends:
    - sonicde/sonic-frameworks-cmake-modules
