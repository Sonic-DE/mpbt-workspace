sources:
    git:
        ref: origin/${master_branch}
        remotes:
            origin:
                url: ${sonicde_git}/${@basename}.git
                depth: ${sonic_depth}
                fetch: ${@SOLUTION::fetch::origin}
            upstream:
                url: https://invent.kde.org/system/dolphin.git
                depth: ${upstream_depth}
                fetch: ${@SOLUTION::fetch::upstream}
        config:
            autopick.enabled: 'true'
            autopick.upstream: upstream/release/26.04
            autopick.master: origin/${master_branch}
            autopick.tracker: origin/tracking/release-26.04
            advice.detachedHead: 'false'
            remote.origin.tagOpt: --no-tags
            remote.upstream.tagOpt: --no-tags
        local-branch: ${master_branch}

master_branch: master

buildsystem: cmake

build-depends:
    - sonicde/sonic-frameworks-cmake-modules

depends:
    - qt6/qtbase
    - qt6/qtmultimedia
    - sonicde/sonic-frameworks-addons-downloader
    - sonicde/sonic-frameworks-bookmarks
    - sonicde/sonic-frameworks-color-scheme
    - sonicde/sonic-frameworks-core-addons
    - sonicde/sonic-frameworks-crash-handler
    - sonicde/sonic-frameworks-dbus
    - sonicde/sonic-frameworks-device-integration
    - sonicde/sonic-frameworks-file-metadata
    - sonicde/sonic-frameworks-file-search
    - sonicde/sonic-frameworks-gui-addons
    - sonicde/sonic-frameworks-icon-themes
    - sonicde/sonic-frameworks-internationalization
    - sonicde/sonic-frameworks-io
    - sonicde/sonic-frameworks-io-extras
    - sonicde/sonic-frameworks-notifications
    - sonicde/sonic-frameworks-settings
    - sonicde/sonic-frameworks-settings-utils
    - sonicde/sonic-frameworks-text-codec
    - sonicde/sonic-frameworks-text-widgets
    - sonicde/sonic-frameworks-ui-components
    - sonicde/sonic-frameworks-user-feedback
    - sonicde/sonic-frameworks-widgets-addons
    - sonicde/sonic-frameworks-windowsystem
